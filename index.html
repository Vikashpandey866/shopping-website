<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopVerse — Modern Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/main.css" />
<link rel="stylesheet" href="/components.css" />
</head>
<body>

  <!-- ── Navigation ────────────────────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="#" onclick="navigate('home')">
        <span class="logo-mark">◈</span> ShopVerse
      </a>
      <div class="nav-links" id="navLinks">
        <a onclick="navigate('home')">Home</a>
        <a onclick="navigate('products')">Shop</a>
        <a onclick="navigate('home'); scrollToSection('about')">About</a>
      </div>
      <div class="nav-actions">
        <button class="nav-search-btn" onclick="toggleSearch()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="nav-cart-btn" onclick="navigate('cart')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
        <div class="nav-user" id="navUser">
          <button class="btn-outline" onclick="navigate('login')">Sign In</button>
        </div>
      </div>
      <button class="nav-hamburger" onclick="toggleMobileNav()">
        <span></span><span></span><span></span>
      </button>
    </div>
    <!-- Search overlay -->
    <div class="search-overlay" id="searchOverlay">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="handleSearchInput(this.value)" />
      <button onclick="toggleSearch()">✕</button>
    </div>
  </nav>

  <!-- ── Main Content (SPA container) ──────────────────────────────────────── -->
  <main id="app"></main>

  <!-- ── Toast Notifications ───────────────────────────────────────────────── -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ── Loading Overlay ───────────────────────────────────────────────────── -->
  <div id="loader" class="loader-overlay" style="display:none">
    <div class="loader-spinner"></div>
  </div>

  <!-- ── Page Templates ────────────────────────────────────────────────────── -->

  <!-- HOME -->
  <template id="tpl-home">
    <section class="hero">
      <div class="hero-bg">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
      </div>
      <div class="hero-content">
        <p class="hero-eyebrow">New Season Arrivals</p>
        <h1 class="hero-title">Curated for<br/><em>Those Who</em><br/>Demand More</h1>
        <p class="hero-subtitle">Discover premium products selected for quality, design, and lasting value.</p>
        <div class="hero-cta">
          <button class="btn-primary" onclick="navigate('products')">Explore Collection</button>
          <button class="btn-ghost" onclick="navigate('products')">View Lookbook →</button>
        </div>
      </div>
      <div class="hero-image-wrap">
        <div class="hero-image-frame">
          <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=600" alt="Collection" />
        </div>
        <div class="hero-badge">
          <span class="badge-num">500+</span>
          <span class="badge-label">Products</span>
        </div>
      </div>
    </section>

    <section class="categories-strip">
      <div class="container">
        <div class="cats-grid" id="catsGrid">
          <!-- filled by JS -->
        </div>
      </div>
    </section>

    <section class="featured-section">
      <div class="container">
        <div class="section-header">
          <h2>Featured Products</h2>
          <a onclick="navigate('products')" class="see-all">See all →</a>
        </div>
        <div class="products-grid" id="featuredGrid">
          <!-- filled by JS -->
        </div>
      </div>
    </section>

    <section class="banner-strip" id="about">
      <div class="banner-inner">
        <div class="banner-stat"><span class="bs-num">12k+</span><span class="bs-label">Happy Customers</span></div>
        <div class="banner-divider"></div>
        <div class="banner-stat"><span class="bs-num">500+</span><span class="bs-label">Premium Products</span></div>
        <div class="banner-divider"></div>
        <div class="banner-stat"><span class="bs-num">Free</span><span class="bs-label">Shipping ₹999+</span></div>
        <div class="banner-divider"></div>
        <div class="banner-stat"><span class="bs-num">24/7</span><span class="bs-label">Customer Support</span></div>
      </div>
    </section>
  </template>

  <!-- PRODUCTS -->
  <template id="tpl-products">
    <div class="page-products">
      <div class="products-sidebar">
        <div class="filter-block">
          <h4>Categories</h4>
          <div id="filterCategories" class="filter-cats"></div>
        </div>
        <div class="filter-block">
          <h4>Price Range</h4>
          <div class="price-inputs">
            <input type="number" id="minPrice" placeholder="Min ₹" />
            <span>–</span>
            <input type="number" id="maxPrice" placeholder="Max ₹" />
          </div>
          <button class="btn-sm" onclick="applyFilters()">Apply</button>
        </div>
        <div class="filter-block">
          <h4>Sort By</h4>
          <select id="sortSelect" onchange="applyFilters()">
            <option value="created_at">Newest First</option>
            <option value="price_asc">Price: Low → High</option>
            <option value="price_desc">Price: High → Low</option>
            <option value="rating">Top Rated</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
        <button class="btn-outline-sm" onclick="clearFilters()">Clear Filters</button>
      </div>
      <div class="products-main">
        <div class="products-topbar">
          <h2 id="productsHeading">All Products</h2>
          <span id="productsCount" class="products-count"></span>
        </div>
        <div class="products-grid" id="productsGrid"></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </template>

  <!-- PRODUCT DETAIL -->
  <template id="tpl-product-detail">
    <div class="page-detail container">
      <button class="back-btn" onclick="history.back()">← Back</button>
      <div id="productDetailContent"></div>
    </div>
  </template>

  <!-- CART -->
  <template id="tpl-cart">
    <div class="page-cart container">
      <h2 class="page-title">Your Cart</h2>
      <div class="cart-layout">
        <div class="cart-items" id="cartItemsList"></div>
        <div class="cart-summary" id="cartSummary"></div>
      </div>
    </div>
  </template>

  <!-- CHECKOUT -->
  <template id="tpl-checkout">
    <div class="page-checkout container">
      <h2 class="page-title">Checkout</h2>
      <div class="checkout-layout">
        <div class="checkout-form-wrap">
          <div class="checkout-section">
            <h3>Shipping Address</h3>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="co-name" placeholder="Rahul Sharma" />
            </div>
            <div class="form-group">
              <label>Address Line</label>
              <input type="text" id="co-address" placeholder="123, MG Road" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" id="co-city" placeholder="Mumbai" />
              </div>
              <div class="form-group">
                <label>PIN Code</label>
                <input type="text" id="co-pin" placeholder="400001" />
              </div>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="co-phone" placeholder="+91 9876543210" />
            </div>
          </div>

          <div class="checkout-section">
            <h3>Payment</h3>
            <div class="payment-options">
              <label class="payment-option selected">
                <input type="radio" name="payment" value="mock" checked />
                <span class="po-icon">💳</span>
                <span>Pay Online (Mock)</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="cod" />
                <span class="po-icon">💵</span>
                <span>Cash on Delivery</span>
              </label>
            </div>
            <!-- Mock card UI -->
            <div class="mock-card-ui" id="mockCardUI">
              <div class="card-preview">
                <div class="card-chip"></div>
                <div class="card-number">•••• •••• •••• 4242</div>
                <div class="card-meta"><span>CARDHOLDER NAME</span><span>12/27</span></div>
              </div>
              <p class="card-note">🔒 This is a demo. No real payment will be processed.</p>
            </div>
          </div>
        </div>

        <div class="order-summary" id="checkoutSummary"></div>
      </div>
    </div>
  </template>

  <!-- LOGIN -->
  <template id="tpl-login">
    <div class="page-auth">
      <div class="auth-card">
        <div class="auth-brand">◈ ShopVerse</div>
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Login form -->
        <div id="formLogin">
          <h2>Welcome back</h2>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" />
          </div>
          <button class="btn-primary full-width" onclick="doLogin()">Sign In</button>
          <p class="auth-hint">Demo admin: <strong>admin@shopverse.com</strong> / <strong>admin123</strong></p>
        </div>

        <!-- Register form -->
        <div id="formRegister" style="display:none">
          <h2>Join ShopVerse</h2>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Your Name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="Min 6 characters" />
          </div>
          <button class="btn-primary full-width" onclick="doRegister()">Create Account</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ORDER HISTORY -->
  <template id="tpl-orders">
    <div class="page-orders container">
      <h2 class="page-title">Order History</h2>
      <div id="ordersList"></div>
    </div>
  </template>

  <!-- ADMIN PANEL -->
  <template id="tpl-admin">
    <div class="page-admin">
      <aside class="admin-sidebar">
        <div class="admin-brand">◈ Admin</div>
        <nav class="admin-nav">
          <a onclick="showAdminSection('dashboard')" class="active">Dashboard</a>
          <a onclick="showAdminSection('products')">Products</a>
          <a onclick="showAdminSection('orders')">Orders</a>
          <a onclick="showAdminSection('users')">Users</a>
        </nav>
      </aside>
      <div class="admin-content" id="adminContent">
        <!-- filled by JS -->
      </div>
    </div>
  </template>

  <!-- JS -->
<script src="/api.js"></script>
<script src="/store.js"></script>
<script src="/app.js"></script>
</body>
</html>
